print_info() {
    prin "┌───────────────────────────────────────────────┐"
    info "\n \n ${cl1} " distro
    info "\n \n ${cl2}󰍹 " model
    info "\n \n ${cl3} " kernel
    info "\n \n ${cl4}󰅐 " uptime
    # info "\n \n ${cl5}󰏗 " packages
    # info "\n \n ${cl6} " shell
    # info "\n \n ${cl7}⛶ " resolution
    info "\n \n ${cl2} " de
    # info "\n \n ${cl1} " wm
    # info "\n \n ${cl6}󰉼 " theme
    info "\n \n ${cl5} " term
    info "\n \n ${cl2} " song
    # [[ "$player" ]] && prin "\n \n ${cl3} " "$player"    
    info "\n \n ${cl4}󰍛 " cpu
    info "\n \n ${cl1} " gpu
    info "\n \n ${cl6}󰑭 " memory

    info "\n \n ${cl7} " disk
    # info "\n \n ${cl3}󰂄 " battery
    info "\n \n ${cl4} " local_ip
    # info "\n \n ${cl3}󰈀 " public_ip
    prin "${cl0}└────────── ${cl1}⬤ ─ ${cl2}⬤ ─ ${cl3}⬤ ─ ${cl4}⬤ ─ ${cl5}⬤ ─ ${cl6}⬤ ─ ${cl7}⬤ ${cl0} ──────────┘"
}

magenta="\033[1;35m"
green="\033[1;32m"
white="\033[1;37m"
blue="\033[1;34m"
red="\033[1;31m"
black="\033[1;40;30m"
yellow="\033[1;33m"
cyan="\033[1;36m"
reset="\033[0m"
bgyellow="\033[1;43;33m"
bgwhite="\033[1;47;37m"

cl0="${reset}"
cl1="${magenta}"
cl2="${green}"
cl3="${white}"
cl4="${blue}"
cl5="${red}"
cl6="${yellow}"
cl7="${cyan}"
cl8="${black}"
cl9="${bgyellow}"
cl10="${bgwhite}"

